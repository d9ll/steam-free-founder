name: d9hi AI
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Basic AI Moderation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import os, requests, json

          with open(os.environ['GITHUB_EVENT_PATH'], 'r') as f:
              event = json.load(f)
          
          num = event['issue']['number']
          author = event['sender']['login']
          title = event['issue']['title']
          body = event['issue']['body'] or "Описание отсутствует"
          content = f"Заголовок: {title}\nОписание: {body}"
          
          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={os.getenv('GEMINI_API_KEY')}"
          
          # Упрощенный промпт без личностей
          prompt = f"""
          Ты — автоматический модератор проекта d9hi. 
          Твоя задача: классифицировать тикет и дать краткий ответ.
          
          Классификация:
          - 'question': если это вопрос, приветствие или просьба о помощи.
          - 'bug': если сообщают об ошибке.
          - 'enhancement': если предлагают идею.
          - 'trash': только если это явный спам, мат или бессвязный набор букв.
          
          Автор тикета: {author}.
          
          Ответь строго в 3 строки:
          1. Тег
          2. Вердикт (APPROVE или REJECT)
          3. Краткий, спокойный комментарий.
          
          Контент:
          {content}
          """
          
          try:
              r = requests.post(url, json={"contents": [{"parts": [{"text": prompt}]}]}, timeout=20)
              res = r.json()['candidates'][0]['content']['parts'][0]['text'].strip().split('\n')
              label, status, msg = res[0].lower().strip(), res[1].upper().strip(), "\n".join(res[2:])
          except:
              label, status, msg = "question", "APPROVE", "Тикет принят на рассмотрение."

          # 1. Вешаем метку
          os.system(f"gh issue edit {num} --add-label '{label}'")
          
          # 2. Оставляем комментарий
          os.system(f"gh issue comment {num} --body '🤖 **d9hi AI Monitor**\n\n**Вердикт:** {status}\n**Тег:** `{label}`\n\n{msg}'")
          
          # 3. Закрываем ТОЛЬКО если это реально жесткий спам (trash)
          if label == "trash" and author.lower() != "d9ll":
              os.system(f"gh issue close {num} -r 'not_planned'")
