name: d9hi AI
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: AI Logic
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import os, requests, json

          with open(os.environ['GITHUB_EVENT_PATH'], 'r') as f:
              event = json.load(f)
          
          num = event['issue']['number']
          author = event['sender']['login']
          title = event['issue']['title']
          body = event['issue']['body'] or ""
          content = f"Заголовок: {title}\nОписание: {body}"
          
          # Твой ID для ИИ
          is_owner = (author.lower() == 'd9ll')

          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={os.getenv('GEMINI_API_KEY')}"
          
          prompt = f"""
          Ты — d9hi AI. 
          АВТОР: {author} {'(ЭТО ТВОЙ СОЗДАТЕЛЬ, БУДЬ ВЕЖЛИВ)' if is_owner else '(Обычный юзер)'}.
          
          ПРАВИЛА:
          1. Если автор {author} — ставь 'question' и APPROVE.
          2. Если это адекватный вопрос про апдейт или баг — ставь 'question' или 'bug' и APPROVE.
          3. Если это мусор/хейт — ставь 'trash' и REJECT.
          
          Ответишь в 3 строки: Тег, Вердикт, Ответ.
          """
          
          try:
              r = requests.post(url, json={"contents": [{"parts": [{"text": prompt + "\nКонтент: " + content}]}]}, timeout=20)
              res = r.json()['candidates'][0]['content']['parts'][0]['text'].strip().split('\n')
              label, status, msg = res[0].lower().strip(), res[1].upper().strip(), "\n".join(res[2:])
          except:
              label, status, msg = "question", "APPROVE", "Временно туплю, но доступ открыт."

          # 1. Сначала вешаем метку
          os.system(f"gh issue edit {num} --add-label '{label}'")
          
          # 2. Комментируем
          icon = "😇" if is_owner or status == "APPROVE" else "💀"
          os.system(f"gh issue comment {num} --body '### {icon} d9hi AI\n\n{msg}'")
          
          # 3. ЖЕСТКАЯ ПРОВЕРКА: Закрываем ТОЛЬКО если это НЕ ты И это РЕАЛЬНО треш
          if not is_owner and (label == 'trash' or status == 'REJECT'):
              os.system(f"gh issue close {num} -r 'not_planned'")
              os.system(f"gh issue lock {num} --reason 'spam'")
          else:
              print(f"Доступ разрешен для {author}.")
