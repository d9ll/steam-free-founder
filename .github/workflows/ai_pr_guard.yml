name: d9hi AI
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Dual Personality Logic
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import os, requests, json

          with open(os.environ['GITHUB_EVENT_PATH'], 'r') as f:
              event = json.load(f)
          
          num = event['issue']['number']
          content = f"Заголовок: {event['issue']['title']}\nОписание: {event['issue']['body'] or 'Пусто'}"
          
          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={os.getenv('GEMINI_API_KEY')}"
          
          prompt = f"""
          Ты — d9hi AI с двумя личностями.
          
          ЛИЧНОСТЬ 1 (Assistant): Если пользователь задает нормальный вопрос, сообщает о баге или предлагает идею. Будь вежлив, помоги советом. Теги: [question, bug, enhancement].
          
          ЛИЧНОСТЬ 2 (Destroyer): Если пользователь спамит, хейтит, пишет бред ('проект говно', 'аааа', 'ыыы'). Будь максимально токсичным, используй черный юмор, унизь тролля. Теги: [trash, invalid].
          
          ВАЖНО: Если это Личность 2 — ОБЯЗАТЕЛЬНО ставь тег 'trash'.
          
          Ответь строго в 3 строки:
          1. Тег
          2. Вердикт (APPROVE или REJECT)
          3. Ответ от лица соответствующей личности.
          
          Контент для анализа:
          {content}
          """
          
          try:
              r = requests.post(url, json={"contents": [{"parts": [{"text": prompt}]}]}, timeout=20)
              res = r.json()['candidates'][0]['content']['parts'][0]['text'].strip().split('\n')
              label, status, msg = res[0].lower().strip(), res[1].upper().strip(), "\n".join(res[2:])
          except:
              label, status, msg = "trash", "REJECT", "Мои системы отказываются переваривать этот бред."

          # 1. Вешаем тег
          os.system(f"gh issue edit {num} --add-label '{label}'")
          
          # 2. Комментируем
          personality = "😇 **d9hi Assistant**" if status == "APPROVE" else "💀 **d9hi Destroyer**"
          os.system(f"gh issue comment {num} --body '{personality}\n\n{msg}'")
          
          # 3. Наказываем, если это треш
          if status == "REJECT" or label == "trash":
              os.system(f"gh issue close {num} -r 'not_planned'")
              os.system(f"gh issue lock {num} --reason 'spam'")
