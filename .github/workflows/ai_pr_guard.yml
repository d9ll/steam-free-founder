name: d9hi AI
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: AI Logic
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import os, requests, json

          with open(os.environ['GITHUB_EVENT_PATH'], 'r') as f:
              event = json.load(f)
          
          num = event['issue']['number']
          author = event['sender']['login']
          title = event['issue']['title']
          body = event['issue']['body'] or ""
          content = f"Заголовок: {title}\nОписание: {body}"
          
          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={os.getenv('GEMINI_API_KEY')}"
          
          # Узнаем тебя, чтобы быть паинькой
          is_owner = (author.lower() == 'd9ll')

          prompt = f"""
          Ты — d9hi AI. Твоя задача — первичная сортировка.
          
          1. Если автор - {author}, всегда ставь APPROVE и тег 'question'.
          2. Если это вопрос, баг или просьба об обновлении (даже если описание короткое) — ставь APPROVE и тег 'question' или 'bug'.
          3. Если это явный спам, оскорбления, бред или 'рататата' — ставь REJECT и тег 'trash'.
          
          Ответь строго в 3 строки:
          1. Тег (trash, question, bug, enhancement)
          2. Вердикт (APPROVE или REJECT)
          3. Твой ответ (для людей — помощь, для троллей — прожарка).
          
          Контент:
          {content}
          """
          
          try:
              r = requests.post(url, json={"contents": [{"parts": [{"text": prompt}]}]}, timeout=20)
              res = r.json()['candidates'][0]['content']['parts'][0]['text'].strip().split('\n')
              label, status, msg = res[0].lower().strip(), res[1].upper().strip(), "\n".join(res[2:])
          except:
              label, status, msg = "question", "APPROVE", "Я приболел, Глеб посмотрит сам."

          # 1. Вешаем метку в любом случае
          os.system(f"gh issue edit {num} --add-label '{label}'")
          
          # 2. Оформляем ответ
          personality = "😇 **d9hi Assistant**" if status == "APPROVE" else "💀 **d9hi Destroyer**"
          os.system(f"gh issue comment {num} --body '### {personality}\n\n**Тег:** `{label}`\n\n{msg}'")
          
          # 3. ЗАКРЫВАЕМ ТОЛЬКО ТРЕШ И ИНВАЛИДОВ
          # Обычные вопросы (question) теперь НЕ закрываются!
          if label in ['trash', 'invalid'] and status == "REJECT":
              os.system(f"gh issue close {num} -r 'not_planned'")
              os.system(f"gh issue lock {num} --reason 'spam'")
          else:
              print("Issue оставлен открытым для владельца.")
