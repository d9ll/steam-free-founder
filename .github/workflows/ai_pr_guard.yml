name: d9hi AI
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: AI Logic
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import os, requests, json

          # Загружаем данные о событии
          with open(os.environ['GITHUB_EVENT_PATH'], 'r') as f:
              event = json.load(f)
          
          num = event['issue']['number']
          author = event['sender']['login']
          title = event['issue']['title']
          body = event['issue']['body'] or "Пусто"
          content = f"Заголовок: {title}\nОписание: {body}"
          
          # Актуальная модель Gemini 2.5 Flash из твоих лимитов
          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={os.getenv('GEMINI_API_KEY')}"
          
          # Проверка на владельца
          is_owner = (author.lower() == 'd9ll')

          prompt = f"""
          Ты — d9hi AI. У тебя две личности:
          
          1. 😇 ASSISTANT: Включается, если автор - {author} (он владелец) или если вопрос нормальный. Будь вежлив, помоги по делу. Теги: [question, bug, enhancement].
          
          2. 💀 DESTROYER: Включается, если в контенте бред, спам, хейт или 'рататата'. Ставь тег 'trash', будь максимально токсичным, используй черный юмор и унизь тролля за тупость.
          
          Ответь строго в 3 строки:
          1. Тег (trash, если это Destroyer)
          2. Вердикт (APPROVE / REJECT)
          3. Ответ от выбранной личности.
          
          Контент:
          {content}
          """
          
          try:
              r = requests.post(url, json={"contents": [{"parts": [{"text": prompt}]}]}, timeout=20)
              res = r.json()['candidates'][0]['content']['parts'][0]['text'].strip().split('\n')
              label = res[0].lower().strip()
              status = res[1].upper().strip()
              msg = "\n".join(res[2:])
          except:
              label, status, msg = "trash", "REJECT", "Система d9hi AI не может переварить этот кринж."

          # 1. Вешаем метку
          os.system(f"gh issue edit {num} --add-label '{label}'")
          
          # 2. Пишем ответ
          personality = "😇 **d9hi Assistant**" if status == "APPROVE" else "💀 **d9hi Destroyer**"
          comment = f"### {personality}\n\n**Тег:** `{label}`\n\n{msg}"
          os.system(f"gh issue comment {num} --body '{comment}'")
          
          # 3. Репрессии для троллей
          if status == "REJECT" or label == "trash":
              os.system(f"gh issue close {num} -r 'not_planned'")
              os.system(f"gh issue lock {num} --reason 'spam'")
