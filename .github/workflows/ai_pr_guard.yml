name: d9hi AI
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: AI Logic
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import os, requests, json

          with open(os.environ['GITHUB_EVENT_PATH'], 'r') as f:
              event = json.load(f)
          
          num = event['issue']['number']
          content = f"Title: {event['issue']['title']}\nBody: {event['issue']['body'] or 'Empty'}"
          
          # Используем актуальную модель Gemini 2.5 Flash
          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={os.getenv('GEMINI_API_KEY')}"
          
          prompt = f"""
          Ты — d9hi AI. Модерируй это Issue. 
          Если это бред, спам или хейт — ставь тег 'trash' и REJECT.
          Если нормальный вопрос — ставь 'question' или 'bug'.
          
          Ответь строго в 3 строки:
          1. Тег
          2. Вердикт (APPROVE/REJECT)
          3. Короткий ответ (для троллей — жестко, для людей — по делу).
          
          Контент:
          {content}
          """
          
          try:
              r = requests.post(url, json={"contents": [{"parts": [{"text": prompt}]}]}, timeout=20)
              res = r.json()['candidates'][0]['content']['parts'][0]['text'].strip().split('\n')
              label, status, msg = res[0].lower().strip(), res[1].upper().strip(), "\n".join(res[2:])
          except:
              label, status, msg = "trash", "REJECT", "Система d9hi AI не принимает такой контент."

          # Применяем санкции
          os.system(f"gh issue edit {num} --add-label '{label}'")
          os.system(f"gh issue comment {num} --body '### 🤖 d9hi AI\n{msg}'")
          
          if status == "REJECT" or label == "trash":
              os.system(f"gh issue close {num} -r 'not_planned'")
              os.system(f"gh issue lock {num} --reason 'spam'")
