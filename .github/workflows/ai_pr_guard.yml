name: d9hi AI
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Dual Personality Logic
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import os, requests, json

          with open(os.environ['GITHUB_EVENT_PATH'], 'r') as f:
              event = json.load(f)
          
          num = event['issue']['number']
          title = event['issue']['title']
          body = event['issue']['body'] or "Пусто"
          content = f"Заголовок: {title}\nОписание: {body}"
          
          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={os.getenv('GEMINI_API_KEY')}"
          
          prompt = f"""
          Ты — d9hi AI. У тебя две крайности:
          
          1. 😇 ASSISTANT (если контент полезный): Помогай как бро. Используй метки [question, bug, enhancement, go].
          
          2. 💀 DESTROYER (если контент мусор, хейт или тупость): Ставь метку 'trash' и уничтожь самооценку автора. Используй сарказм, черный юмор и прямо говори, что автор — клоун. Будь токсичным техлидом, которому надоело читать бред.
          
          Ответь строго в 3 строки:
          1. Тег (trash, если это Личность 2)
          2. Вердикт (APPROVE / REJECT)
          3. Ответ от выбранной личности.
          
          Контент:
          {content}
          """
          
          try:
              r = requests.post(url, json={"contents": [{"parts": [{"text": prompt}]}]}, timeout=20)
              res = r.json()['candidates'][0]['content']['parts'][0]['text'].strip().split('\n')
              label, status, msg = res[0].lower().strip(), res[1].upper().strip(), "\n".join(res[2:])
          except:
              label, status, msg = "trash", "REJECT", "Бот даже не стал это читать. Слишком много кринжа."

          # Ставим метку
          os.system(f"gh issue edit {num} --add-label '{label}'")
          
          # Оформляем ответ
          icon = "😇" if status == "APPROVE" else "💀"
          header = f"### {icon} d9hi AI Verdict"
          os.system(f"gh issue comment {num} --body '{header}\n\n**Тег:** `{label}`\n\n{msg}'")
          
          # Если это трэш — закрываем и вешаем замок
          if status == "REJECT" or label == "trash":
              os.system(f"gh issue close {num} -r 'not_planned'")
              os.system(f"gh issue lock {num} --reason 'spam'")
