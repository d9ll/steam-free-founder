name: d9hi AI
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: AI Logic
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import os, requests, json

          with open(os.environ['GITHUB_EVENT_PATH'], 'r') as f:
              event = json.load(f)
          
          num = event['issue']['number']
          author = event['sender']['login']
          title = event['issue']['title']
          body = event['issue']['body'] or "ОПИСАНИЕ ОТСУТСТВУЕТ"
          
          # Полный контекст для ИИ
          full_context = f"ЗАГОЛОВОК: {title}\nОПИСАНИЕ: {body}"
          
          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={os.getenv('GEMINI_API_KEY')}"
          
          is_owner = (author.lower() == 'd9ll')

          prompt = f"""
          Ты — d9hi AI. Проанализируй тикет.
          ВАЖНО: Смотри и на ЗАГОЛОВОК, и на ОПИСАНИЕ. 
          
          1. Если в ЗАГОЛОВКЕ пожелание, адекватный вопрос или баг (даже при пустом описании) — это APPROVE.
          2. Если автор {author} — это всегда APPROVE.
          3. Если и заголовок, и описание — это бессвязный бред или хейт ('ыыы', 'проект говно') — это REJECT и тег 'trash'.
          
          Ответишь в 3 строки: Тег, Вердикт, Ответ.
          """
          
          try:
              payload = {"contents": [{"parts": [{"text": f"{prompt}\n\nКонтент:\n{full_context}"}]}]}
              r = requests.post(url, json=payload, timeout=20)
              res = r.json()['candidates'][0]['content']['parts'][0]['text'].strip().split('\n')
              label, status, msg = res[0].lower().strip(), res[1].upper().strip(), "\n".join(res[2:])
          except:
              label, status, msg = "question", "APPROVE", "Оставляю на усмотрение владельца."

          # Ставим метку
          os.system(f"gh issue edit {num} --add-label '{label}'")
          
          # Пишем коммент
          icon = "😇" if status == "APPROVE" else "💀"
          os.system(f"gh issue comment {num} --body '### {icon} d9hi AI\n\n{msg}'")
          
          # ЗАКРЫВАЕМ ТОЛЬКО ЕСЛИ ЭТО РЕАЛЬНЫЙ МУСОР И НЕ ТЫ
          if not is_owner and status == "REJECT" and label == "trash":
              os.system(f"gh issue close {num} -r 'not_planned'")
              os.system(f"gh issue lock {num} --reason 'spam'")
