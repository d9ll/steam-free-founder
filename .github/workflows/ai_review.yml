name: d9hi PR Guard
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: write

jobs:
  check_pr:
    runs-on: ubuntu-latest
    steps:
      - name: PR-Logic
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import os, requests, json
          with open(os.environ['GITHUB_EVENT_PATH'], 'r') as f:
              event = json.load(f)

          num = event['pull_request']['number']
          author = event['sender']['login']
          title = event['pull_request']['title']
          is_owner = (author.lower() == "d9ll")
          
          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={os.getenv('GEMINI_API_KEY')}"

          # Улучшенный промпт
          prompt = f"""
          Ты модератор PR. Автор: {author}.
          ЗАДАЧА: Если заголовок '{title}' - это случайный набор букв (спам), ставь REJECT.
          Если автор Глеб (d9ll), будь вежлив, но если это явный мусор - скажи об этом.
          Вердикт всегда APPROVE для Глеба, но тег ставь 'invalid' если это спам.
          """

          try:
              r = requests.post(url, json={"contents": [{"parts": [{"text": prompt}]}]}, timeout=20)
              res = r.json()['candidates'][0]['content']['parts'][0]['text'].strip().split('\n')
              label = res[0].lower().strip()
              msg = res[2] if len(res) > 2 else "Код на проверке."
          except:
              label, msg = "dependencies", "Ок."

          os.system(f"gh pr edit {num} --add-label '{label}'")
          os.system(f"gh pr comment {num} --body '### 🛡️ PR Monitor\n{msg}'")
