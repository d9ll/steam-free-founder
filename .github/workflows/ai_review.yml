name: d9hi PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Ask Gemini AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 1. Берем только суть изменений (файлы и строки)
          DIFF=$(git diff HEAD^ HEAD | head -c 4000)
          
          # 2. Формируем чистый JSON для запроса
          cat <<EOF > payload.json
          {
            "contents": [{
              "parts": [{
                "text": "Ты — AI-ассистент проекта d9hi. Твоя задача: проверить изменения в Pull Request. Если автор 'dependabot[bot]', напиши: 'Зафиксировано обновление зависимостей. Принимаю автоматически.' Если автор 'd9ll', проверь логику парсинга Steam и безопасность кода. Отвечай на русском. В конце: 'Проверка d9hi завершена 🚀'. Изменения кода: $DIFF"
              }]
            }]
          }
          EOF

          # 3. Запрос к API
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d @payload.json)

          # 4. Достаем ответ (jq -r вытащит текст без кавычек)
          RESULT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "Ошибка: Google не вернул текст. Проверь API Key или лимиты."')
          
          # Если в ответе ошибка про ключ или модель, выведем её для отладки
          if [[ "$RESULT" == *"Ошибка"* ]]; then echo "Full Response: $RESPONSE"; fi

          echo "AI_RESULT<<EOF" >> $GITHUB_ENV
          echo "$RESULT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            ### 🤖 d9hi AI Code Review
            ${{ env.AI_RESULT }}
