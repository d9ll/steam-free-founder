name: d9hi Omnipotence Reviewer

on:
  pull_request:
    types: [opened, synchronize]
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Gemini AI Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_ACTOR: ${{ github.actor }}
        shell: python
        run: |
          import os, requests, json, subprocess

          api_key = os.getenv("GEMINI_API_KEY")
          author = os.getenv("GITHUB_ACTOR")
          
          with open(os.environ['GITHUB_EVENT_PATH'], 'r', encoding='utf-8') as f:
              event_data = json.load(f)
          
          is_pr = "pull_request" in event_data
          if is_pr:
              try:
                  diff = subprocess.check_output(["git", "diff", "HEAD^", "HEAD"]).decode("utf-8")[:3000]
                  content = f"TYPE: Pull Request\nDIFF:\n{diff}"
              except: content = "TYPE: Pull Request (Empty or New)"
          else:
              content = f"TYPE: Issue\nTITLE: {event_data.get('issue', {}).get('title')}\nBODY: {event_data.get('issue', {}).get('body')}"

          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={api_key}"
          
          # Промпт стал намного жестче
          prompt = f"""
          Ты — безжалостный техлид d9hi. Твоя цель — чистота репозитория.
          Автор: {author}
          
          ПРАВИЛА:
          1. Если в контенте есть фразы типа 'привет', 'как дела', 'тест', 'бла бла', или это просто пустой треп — это REJECT.
          2. Если это Pull Request с бесполезными изменениями — это REJECT.
          3. Если это реальный баг-репорт или годный код — это APPROVE.

          ОТВЕТЬ СТРОГО ПО ШАБЛОНУ (3 строки):
          Строка 1: МЕТКА (выбери одну: bug, enhancement, question, invalid, documentation, go)
          Строка 2: ВЕРДИКТ (строго REJECT или APPROVE)
          Строка 3: Твой разнос или похвала на русском.

          КОНТЕНТ:
          {content}
          """

          try:
              payload = {"contents": [{"parts": [{"text": prompt}]}]}
              r = requests.post(url, json=payload, timeout=30)
              data = r.json()
              
              res_text = data["candidates"][0]["content"]["parts"][0]["text"].strip()
              lines = [l.strip() for l in res_text.split('\n') if l.strip()]
              
              # Если ИИ выдал меньше 2 строк, это подозрительно
              label = lines[0].lower() if len(lines) > 0 else "invalid"
              status = "reject" if len(lines) < 2 or "REJECT" in lines[1].upper() else "approve"
              comment = "\n".join(lines[2:]) if len(lines) > 2 else "Нет внятных объяснений. Отклонено."
          except Exception as e:
              label, status, comment = "invalid", "reject", f"Системный сбой или мусорный контент: {str(e)}"

          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f"AI_LABEL={label}\nAI_STATUS={status}\nAI_RESULT<<EOF\n{comment}\nEOF\n")

      - name: Execute
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          TYPE: ${{ github.event_name == 'pull_request' and 'pr' || 'issue' }}
        run: |
          # Вешаем метку и коммент
          gh $TYPE edit $NUMBER --add-label "${{ env.AI_LABEL }}"
          gh $TYPE comment $NUMBER --body "### 🤖 d9hi AI Control\n**Статус:** ${{ env.AI_STATUS }}\n\n${{ env.AI_RESULT }}"
          
          # Если REJECT — закрываем немедленно
          if [ "${{ env.AI_STATUS }}" = "reject" ]; then
            gh $TYPE close $NUMBER --reason "not_planned" --comment "d9hi: Мусор обнаружен. Доступ заблокирован."
          fi
