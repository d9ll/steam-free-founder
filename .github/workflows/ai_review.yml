name: d9hi PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Gemini AI Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_ACTOR: ${{ github.actor }}
        shell: python
        run: |
          import os
          import requests
          import json
          import subprocess

          api_key = os.getenv("GEMINI_API_KEY")
          author = os.getenv("GITHUB_ACTOR")

          try:
              diff = subprocess.check_output(["git", "diff", "HEAD^", "HEAD"]).decode("utf-8")[:4000]
              url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={api_key}"
              
              prompt = f"""
              Ты — жесткий AI-ассистент проекта d9hi. 
              Автор: {author}.
              
              ЗАДАЧА:
              1. Если автор 'dependabot[bot]', напиши 'ACCEPT' и кратко что обновилось.
              2. Если в коде мусор, пустые файлы или 'бла-бла', напиши в первой строке 'REJECT', а дальше жестко раскритикуй.
              3. Если код полезный, напиши 'APPROVE' и похвали.
              
              Отвечай на русском. В конце: 'Проверка d9hi завершена 🚀'.
              Код:
              {diff}
              """

              payload = {"contents": [{"parts": [{"text": prompt}]}]}
              response = requests.post(url, json=payload)
              result = response.json()["candidates"][0]["content"]["parts"][0]["text"]
          except Exception as e:
              result = f"REJECT\nОшибка: {str(e)}"

          # Определяем статус для GitHub Actions
          status = "approve"
          if "REJECT" in result:
              status = "reject"
          
          # Очищаем текст от технического слова REJECT/APPROVE для комментария
          clean_result = result.replace("REJECT", "").replace("APPROVE", "").replace("ACCEPT", "").strip()

          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f"AI_RESULT<<EOF\n{clean_result}\nEOF\n")
              f.write(f"PR_STATUS={status}\n")

      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            ### 🤖 d9hi AI Code Review
            ${{ env.AI_RESULT }}

      # ШАГ ЗАКРЫТИЯ: Если ИИ сказал REJECT — закрываем PR
      - name: Close Trash PR
        if: env.PR_STATUS == 'reject'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr close ${{ github.event.pull_request.number }} --comment "Автоматическое закрытие: d9hi не принимает мусорные правки."
