name: d9hi PR Guard
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: write

jobs:
  check_pr:
    runs-on: ubuntu-latest
    steps:
      - name: PR-Logic
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import os, requests, json
          with open(os.environ['GITHUB_EVENT_PATH'], 'r') as f:
              event = json.load(f)

          num = event['pull_request']['number']
          author = event['sender']['login']
          title = event['pull_request']['title']
          
          is_owner = (author.lower() == "d9ll")
          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={os.getenv('GEMINI_API_KEY')}"

          if is_owner:
              prompt = f"Глеб залил код: '{title}'. Поставь тег 'go' или 'dependencies'. Вердикт: APPROVE."
          else:
              prompt = f"Проверь PR на адекватность: '{title}'. Если описание пустое или заголовок неясный — REJECT. Теги: bug, dependencies, go, invalid."

          try:
              r = requests.post(url, json={"contents": [{"parts": [{"text": prompt}]}]}, timeout=20)
              res = r.json()['candidates'][0]['content']['parts'][0]['text'].strip().split('\n')
              label = res[0].lower().strip()
              status = "approve" if is_owner else ("reject" if "REJECT" in res[1].upper() else "approve")
              msg = res[2] if len(res) > 2 else "Код отправлен на проверку."
          except:
              label, status, msg = "dependencies", "approve", "PR принят."

          os.system(f"gh pr edit {num} --add-label '{label}'")
          os.system(f"gh pr comment {num} --body '### 🛡️ PR Monitor\n{msg}'")
          
          if status == "reject" and not is_owner:
              os.system(f"gh pr close {num} -c 'PR отклонен из-за недостаточного описания.'")
