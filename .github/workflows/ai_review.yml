name: d9hi PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Gemini AI Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_ACTOR: ${{ github.actor }}
        shell: python
        run: |
          import os, requests, json, subprocess

          api_key = os.getenv("GEMINI_API_KEY")
          author = os.getenv("GITHUB_ACTOR")

          if not api_key:
              print("PR_STATUS=error")
              exit(0)

          try:
              diff = subprocess.check_output(["git", "diff", "HEAD^", "HEAD"]).decode("utf-8")[:4000]
              
              if len(diff.strip()) < 10:
                  result = "REJECT\nСлишком мало изменений. d9hi не принимает пустые файлы."
              else:
                  url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={api_key}"
                  prompt = f"Ты жесткий AI d9hi. Автор: {author}. Если в коде мусор или 'бла-бла', пиши 'REJECT'. Если годно - 'APPROVE'. Код: {diff}"
                  
                  payload = {"contents": [{"parts": [{"text": prompt}]}]}
                  response = requests.post(url, json=payload)
                  data = response.json()
                  
                  if "candidates" in data:
                      result = data["candidates"][0]["content"]["parts"][0]["text"]
                  else:
                      result = f"error\nОшибка API: {data.get('error', {}).get('message', 'Unknown error')}"
          except Exception as e:
              result = f"error\nОшибка: {str(e)}"

          status = "reject" if "REJECT" in result else ("approve" if "APPROVE" in result else "error")
          clean_result = result.replace("REJECT", "").replace("APPROVE", "").strip()

          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f"AI_RESULT<<EOF\n{clean_result}\nEOF\n")
              f.write(f"PR_STATUS={status}\n")

      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: "### 🤖 d9hi AI Code Review\n${{ env.AI_RESULT }}"

      - name: Close Trash PR
        if: env.PR_STATUS == 'reject'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr close ${{ github.event.pull_request.number }} --comment "d9hi отклонил мусорные правки."
