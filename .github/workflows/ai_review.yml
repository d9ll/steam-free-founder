name: d9hi-ai-2026
on:
  pull_request:
    types: [opened, synchronize]
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gemini-2.5-Logic
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import os, requests, json
          
          # Читаем событие
          with open(os.environ['GITHUB_EVENT_PATH'], 'r') as f:
              event = json.load(f)
          
          is_pr = "pull_request" in event
          num = event['pull_request']['number'] if is_pr else event['issue']['number']
          target = "pr" if is_pr else "issue"
          
          # Актуальная модель 2026 года
          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={os.getenv('GEMINI_API_KEY')}"
          
          content = f"Title: {event.get('issue', {}).get('title', 'PR update')}. Body: {event.get('issue', {}).get('body', 'Check diff')}"
          
          prompt = f"Ты техлид d9hi. Ответь в 3 строки: 1. Метка (bug, go, invalid, question). 2. Вердикт (APPROVE/REJECT). 3. Коммент на русском. Контент: {content}"
          
          try:
              r = requests.post(url, json={"contents": [{"parts": [{"text": prompt}]}]}, timeout=20)
              res = r.json()['candidates'][0]['content']['parts'][0]['text'].strip().split('\n')
              label = res[0].lower().strip()
              status = "reject" if "REJECT" in res[1].upper() else "approve"
              msg = "\n".join(res[2:])
          except Exception as e:
              label, status, msg = "question", "error", f"Ошибка: Проверь лимиты RPD или модель. {str(e)}"

          # Действия в GitHub
          os.system(f"gh {target} edit {num} --add-label '{label}'")
          os.system(f"gh {target} comment {num} --body '### 🤖 d9hi AI Monitor 2026\n**Статус:** {status}\n\n{msg}'")
          if status == "reject":
              os.system(f"gh {target} close {num}")
