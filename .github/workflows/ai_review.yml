name: d9hi Omnipotence Reviewer

on:
  pull_request:
    types: [opened, synchronize]
  issues:
    types: [opened] # Теперь он точно увидит твои "привет как дела"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Gemini AI Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_ACTOR: ${{ github.actor }}
          EVENT_CONTEXT: ${{ toJson(github.event) }}
        shell: python
        run: |
          import os, requests, json, subprocess

          api_key = os.getenv("GEMINI_API_KEY")
          author = os.getenv("GITHUB_ACTOR")
          event_data = json.loads(os.getenv("EVENT_CONTEXT"))
          
          is_pr = "pull_request" in event_data
          content_to_analyze = ""

          if is_pr:
              # Анализируем код
              try:
                  content_to_analyze = f"DIFF КОДА:\n" + subprocess.check_output(["git", "diff", "HEAD^", "HEAD"]).decode("utf-8")[:3000]
              except: content_to_analyze = "Новый PR без дифф-данных"
          else:
              # Анализируем текст проблемы
              title = event_data.get("issue", {}).get("title", "")
              body = event_data.get("issue", {}).get("body", "")
              content_to_analyze = f"ЗАГОЛОВОК: {title}\nТЕКСТ: {body}"

          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={api_key}"
          
          prompt = f"""
          Ты техлид d9hi. Автор: {author}. 
          Проанализируй контент и ответь СТРОГО в таком формате:
          Строка 1: Название метки (bug, enhancement, question, invalid, documentation или go)
          Строка 2: Вердикт (APPROVE или REJECT)
          Строка 3: Твой комментарий на русском.

          Контент:
          {content_to_analyze}
          """

          try:
              payload = {"contents": [{"parts": [{"text": prompt}]}]}
              response = requests.post(url, json=payload)
              data = response.json()
              res_text = data["candidates"][0]["content"]["parts"][0]["text"].strip()
              lines = res_text.split('\n')
              
              label = lines[0].lower() if any(x in lines[0].lower() for x in ["bug", "enhancement", "question", "invalid", "documentation", "go"]) else "question"
              status = "reject" if "REJECT" in lines[1].upper() else "approve"
              comment = "\n".join(lines[2:])
          except Exception as e:
              label, status, comment = "question", "error", f"Ошибка анализа: {str(e)}"

          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f"AI_LABEL={label.strip()}\n")
              f.write(f"AI_STATUS={status}\n")
              f.write(f"AI_RESULT<<EOF\n{comment}\nEOF\n")

      - name: Comment and Label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          TYPE: ${{ github.event_name == 'pull_request' and 'pr' || 'issue' }}
        run: |
          gh $TYPE edit $NUMBER --add-label "${{ env.AI_LABEL }}"
          gh $TYPE comment $NUMBER --body "### 🤖 d9hi AI Review
          Метка: **${{ env.AI_LABEL }}**
          
          ${{ env.AI_RESULT }}
          
          Проверка d9hi завершена 🚀"

      - name: Auto-Close if Trash
        if: env.AI_STATUS == 'reject'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          TYPE: ${{ github.event_name == 'pull_request' and 'pr' || 'issue' }}
        run: gh $TYPE close $NUMBER --comment "d9hi закрыл это как бесполезный контент."
