name: d9hi PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Gemini AI Review
        shell: python
        run: |
          import os
          import requests
          import json
          import subprocess

          # === ТЕСТОВЫЙ ХАРДКОД (УДАЛИТЬ ПОСЛЕ ПРОВЕРКИ!) ===
          api_key = "AIzaSyCQuxc9xIlANvpifsX6vQ6zh7YRiUMwhWU" 
          # ===============================================

          try:
              # 1. Получаем изменения (дифф)
              diff = subprocess.check_output(["git", "diff", "HEAD^", "HEAD"]).decode("utf-8")[:4000]
              
              # 2. Формируем запрос
              url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={api_key}"
              
              prompt = f"""
              Ты — AI-ассистент проекта d9hi. Твоя задача: проверить Pull Request.
              Если автор 'dependabot[bot]', напиши: 'Зафиксировано обновление зависимостей. Принимаю автоматически.'
              Если автор 'd9ll', проверь логику парсинга Steam и безопасность.
              Отвечай на русском языке. В конце добавь: 'Проверка d9hi завершена 🚀'.
              
              Код изменений:
              {diff}
              """

              payload = {
                  "contents": [{"parts": [{"text": prompt}]}]
              }

              # 3. Отправка
              response = requests.post(url, json=payload)
              data = response.json()
              
              if "candidates" in data:
                  result = data["candidates"][0]["content"]["parts"][0]["text"]
              else:
                  # Если ошибка, выводим её полностью для диагностики
                  result = f"Ошибка API Google: {json.dumps(data)}"
          
          except Exception as e:
              result = f"Критическая ошибка скрипта: {str(e)}"

          # 4. Передаем результат в GitHub Environment
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f"AI_RESULT<<EOF\n{result}\nEOF\n")

      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            ### 🤖 d9hi AI Code Review
            ${{ env.AI_RESULT }}
