name: d9hi PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Gemini AI Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_ACTOR: ${{ github.actor }} # ПЕРЕДАЕМ АВТОРА
        shell: python
        run: |
          import os
          import requests
          import json
          import subprocess

          api_key = os.getenv("AIzaSyCQuxc9xIlANvpifsX6vQ6zh7YRiUMwhWU")
          author = os.getenv("GITHUB_ACTOR")

          try:
              diff = subprocess.check_output(["git", "diff", "HEAD^", "HEAD"]).decode("utf-8")[:4000]
              
              url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={api_key}"
              
              # Улучшенный промпт
              prompt = f"""
              Ты — жесткий и профессиональный AI-ассистент проекта d9hi. 
              Автор этого Pull Request: {author}

              ИНСТРУКЦИИ:
              1. Если автор 'dependabot[bot]', просто напиши: "Зафиксировано обновление зависимостей. Проверка пройдена."
              2. Если автор 'd9ll' (это владелец проекта):
                 - Проверь код на полезность. Если в коде мусор, пустые файлы или 'бла-бла', сделай замечание в стиле 'Бро, зачем ты пушишь мусор в d9hi?'.
                 - Проверь безопасность (токены) и логику парсинга Steam.
                 - Если все реально круто, напиши: 'Код огонь, можно мержить'.
              
              Отвечай на русском. В конце добавь: 'Проверка d9hi завершена 🚀'.
              
              КОД ИЗМЕНЕНИЙ:
              {diff}
              """

              payload = {"contents": [{"parts": [{"text": prompt}]}]}
              response = requests.post(url, json=payload)
              data = response.json()
              result = data["candidates"][0]["content"]["parts"][0]["text"] if "candidates" in data else f"Ошибка: {json.dumps(data)}"
          
          except Exception as e:
              result = f"Ошибка: {str(e)}"

          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f"AI_RESULT<<EOF\n{result}\nEOF\n")

      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            ### 🤖 d9hi AI Code Review
            ${{ env.AI_RESULT }}
