name: d9hi AI
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Resetting AI to Normal Mode
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import os, requests, json

          with open(os.environ['GITHUB_EVENT_PATH'], 'r') as f:
              event = json.load(f)
          
          num = event['issue']['number']
          author = event['sender']['login']
          title = event['issue']['title']
          body = event['issue']['body'] or "Описание отсутствует"
          
          # Узнаем тебя, чтобы бот не наглел
          is_owner = (author.lower() == 'd9ll')

          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={os.getenv('GEMINI_API_KEY')}"
          
          prompt = f"""
          Ты — спокойный помощник-модератор проекта d9hi. 
          АВТОР ТИКЕТА: {author}. {'(ЭТО СОЗДАТЕЛЬ ПРОЕКТА - ВСЕГДА APPROVE)' if is_owner else ''}
          
          ПРАВИЛА:
          1. Проанализируй и заголовок ('{title}'), и описание ('{body}').
          2. Если это приветствие, вопрос или идея — ставь APPROVE и тег 'question' или 'enhancement'.
          3. Если это явный спам (бессмысленные буквы) — ставь REJECT и тег 'trash'.
          
          Ответишь в 3 строки: Тег, Вердикт, Твой ответ.
          """
          
          try:
              r = requests.post(url, json={"contents": [{"parts": [{"text": prompt}]}]}, timeout=20)
              res = r.json()['candidates'][0]['content']['parts'][0]['text'].strip().split('\n')
              label, status, msg = res[0].lower().strip(), res[1].upper().strip(), "\n".join(res[2:])
          except:
              label, status, msg = "question", "APPROVE", "Принято к рассмотрению."

          # 1. Вешаем метку
          os.system(f"gh issue edit {num} --add-label '{label}'")
          
          # 2. Пишем вежливый коммент
          os.system(f"gh issue comment {num} --body '🤖 **d9hi AI Monitor**\n\n{msg}'")
          
          # 3. Закрываем ТОЛЬКО если это реально ТРЭШ и это НЕ ТЫ
          if not is_owner and label == 'trash' and status == 'REJECT':
              os.system(f"gh issue close {num} -r 'not_planned'")
