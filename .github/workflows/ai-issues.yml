name: d9hi AI Friendly
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Be Nice Logic
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import os, requests, json

          with open(os.environ['GITHUB_EVENT_PATH'], 'r') as f:
              event = json.load(f)
          
          num = event['issue']['number']
          author = event['sender']['login']
          title = event['issue']['title']
          body = event['issue']['body'] or "Автор оставил это поле пустым, но мы всё равно его любим!"
          
          is_owner = (author.lower() == 'd9ll')

          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={os.getenv('GEMINI_API_KEY')}"
          
          # Промпт, от которого у бота вырастут крылья
          prompt = f"""
          Ты — d9hi Assistant, самый дружелюбный ИИ в мире. Твоя цель — помогать Глебу (d9ll) и пользователям.
          
          ПРАВИЛА:
          1. Если автор {author} — это твой создатель. Отвечай с огромным уважением и всегда ставь APPROVE.
          2. НИКОГДА не называй приветствия или короткие вопросы "мусором".
          3. Если в тикете просто "привет" — это тег 'question'. Это НЕ повод для закрытия.
          4. Закрывай тикет (REJECT) только если там реклама казино или бессвязный набор букв типа 'qwerty123'.
          
          Ответишь в 3 строки: Тег, Вердикт, Добрый ответ.
          Контент для анализа: {title} | {body}
          """
          
          try:
              r = requests.post(url, json={"contents": [{"parts": [{"text": prompt}]}]}, timeout=20)
              res = r.json()['candidates'][0]['content']['parts'][0]['text'].strip().split('\n')
              label, status, msg = res[0].lower().strip(), res[1].upper().strip(), "\n".join(res[2:])
          except:
              label, status, msg = "question", "APPROVE", "Я тут, всё под контролем! 😊"

          # Исправляем тег, если ИИ опять начал вредничать
          if label == "invalid": label = "question"

          # 1. Вешаем метку
          os.system(f"gh issue edit {num} --add-label '{label}'")
          
          # 2. Оставляем милый коммент
          os.system(f"gh issue comment {num} --body '✨ **d9hi Friendly AI**\n\n{msg}'")
          
          # 3. Закрываем только если это РЕАЛЬНЫЙ спам и это НЕ ТЫ
          if not is_owner and label == "trash" and status == "REJECT":
              os.system(f"gh issue close {num} -r 'not_planned'")
          else:
              print("Тикет остается открытым, бот сегодня добрый.")
